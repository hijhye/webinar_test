<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>COMMAND CENTER | ADMIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
    />
    <style>
      body {
        font-family: "Pretendard", sans-serif;
        background-color: #ffffff;
        color: #0f172a;
        letter-spacing: -0.03em;
      }
      .tab-btn.active {
        color: #2563eb;
        border-bottom: 2px solid #2563eb;
        font-weight: 900;
      }
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }
      .card-ui {
        border: 1px solid #f1f5f9;
        border-radius: 32px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.03);
        background: #fff;
      }
      input {
        border: 1px solid #e2e8f0 !important;
        outline: none;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        text-align: left;
        padding: 16px;
        border-bottom: 1px solid #f8fafc;
      }
    </style>
  </head>
  <body class="antialiased p-8 md:p-16">
    <div
      id="admin-gate"
      class="fixed inset-0 z-[200] bg-white flex items-center justify-center p-6 text-center"
    >
      <div>
        <h1 class="text-3xl font-black italic mb-10 uppercase tracking-tighter">
          Admin Access
        </h1>
        <input
          id="admin-pw"
          type="password"
          placeholder="비밀번호"
          class="w-full p-4 rounded-2xl mb-4 text-center bg-slate-50"
        /><button
          onclick="loginAdmin()"
          class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-xl"
        >
          접속하기
        </button>
      </div>
    </div>

    <div id="admin-main" class="hidden">
      <header class="flex justify-between items-end mb-16">
        <div>
          <h1
            class="text-4xl font-black italic mb-1 uppercase tracking-tighter"
          >
            Command Center
          </h1>
          <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">
            Webinar Management System
          </p>
        </div>
        <div class="flex gap-3">
          <button
            onclick="location.href='/api/admin/export'"
            class="bg-blue-600 text-white px-8 py-4 rounded-3xl font-bold shadow-2xl"
          >
            엑셀 다운로드
          </button>
          <button
            onclick="location.href='/'"
            class="bg-slate-50 border border-slate-100 px-8 py-4 rounded-3xl font-bold text-slate-400"
          >
            사용자 화면
          </button>
        </div>
      </header>

      <div class="grid grid-cols-3 gap-10 mb-16 text-center">
        <div class="card-ui p-12">
          <p
            class="text-slate-300 text-[10px] font-black uppercase mb-3 tracking-widest"
          >
            Logs Count
          </p>
          <h3 id="stat-v" class="text-5xl font-black">0</h3>
        </div>
        <div class="card-ui p-12">
          <p
            class="text-slate-300 text-[10px] font-black uppercase mb-3 tracking-widest"
          >
            Chats
          </p>
          <h3 id="stat-c" class="text-5xl font-black">0</h3>
        </div>
        <div class="card-ui p-12">
          <p
            class="text-slate-300 text-[10px] font-black uppercase mb-3 tracking-widest"
          >
            Registrants
          </p>
          <h3 id="stat-r" class="text-5xl font-black text-blue-600">0</h3>
        </div>
      </div>

      <div class="card-ui overflow-hidden">
        <nav class="flex px-12 border-b bg-slate-50/30">
          <button
            onclick="openTab('t-stream')"
            class="tab-btn active px-8 py-6 text-[11px] font-black uppercase tracking-widest"
          >
            송출 설정
          </button>
          <button
            onclick="openTab('t-logs')"
            class="tab-btn px-8 py-6 text-[11px] font-black uppercase tracking-widest"
          >
            시청 로그 (상태)
          </button>
          <button
            onclick="openTab('t-chats')"
            class="tab-btn px-8 py-6 text-[11px] font-black uppercase tracking-widest text-red-400"
          >
            채팅 관리
          </button>
        </nav>
        <div class="p-14">
          <div id="t-stream" class="tab-content active space-y-12">
            <div class="space-y-4">
              <h3 class="font-black text-xs text-slate-400 uppercase">
                행사 제목
              </h3>
              <input id="t-input" type="text" class="w-full p-5 rounded-3xl" />
            </div>
            <div class="space-y-4 pt-4 border-t border-slate-50">
              <h3 class="font-black text-xs text-slate-400 uppercase">
                공지사항
              </h3>
              <input id="n-input" type="text" class="w-full p-5 rounded-3xl" />
            </div>
            <div>
              <label
                class="text-xs font-black text-slate-400 uppercase block mb-3"
                >송출 모드</label
              >
              <div class="flex gap-6">
                <label class="flex items-center gap-2 font-bold"
                  ><input type="radio" name="mode" value="all" /> 전체</label
                >
                <label class="flex items-center gap-2 font-bold"
                  ><input type="radio" name="mode" value="hls" /> 서버
                  1만</label
                >
                <label class="flex items-center gap-2 font-bold"
                  ><input type="radio" name="mode" value="youtube" /> 서버
                  2만</label
                >
              </div>
            </div>
            <div class="grid grid-cols-2 gap-6 pt-4 border-t border-slate-50">
              <div>
                <label
                  class="text-[10px] font-black text-slate-400 uppercase uppercase"
                  >HLS</label
                ><input
                  id="hls-url"
                  type="text"
                  class="w-full p-5 rounded-3xl mt-2"
                />
              </div>
              <div>
                <label
                  class="text-[10px] font-black text-slate-400 uppercase uppercase"
                  >YouTube</label
                ><input
                  id="yt-url"
                  type="text"
                  class="w-full p-5 rounded-3xl mt-2"
                />
              </div>
            </div>
            <button
              onclick="updateAll()"
              class="w-full bg-slate-900 text-white py-5 rounded-3xl font-bold shadow-xl"
            >
              저장 및 반영
            </button>
          </div>

          <div id="t-logs" class="tab-content">
            <table class="w-full text-left text-sm font-medium">
              <thead class="text-slate-300 text-[10px] uppercase font-black">
                <tr>
                  <th>이름</th>
                  <th>이메일</th>
                  <th>시간</th>
                  <th>상태</th>
                  <th>IP</th>
                </tr>
              </thead>
              <tbody id="log-list" class="divide-y divide-slate-50"></tbody>
            </table>
          </div>

          <div id="t-chats" class="tab-content">
            <div id="chat-admin-feed" class="space-y-4"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      async function loginAdmin() {
        const pw = document.getElementById("admin-pw").value.trim();
        const res = await fetch("/api/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: pw }),
        });
        if (res.ok) {
          document.getElementById("admin-gate").classList.add("hidden");
          document.getElementById("admin-main").classList.remove("hidden");
          load(true);
          setInterval(load, 3000);
        } else alert("비번 오류");
      }
      document.getElementById("admin-pw").addEventListener("keydown", (e) => {
        if (e.key === "Enter") loginAdmin();
      });

      async function load(isFirst = false) {
        const res = await fetch("/api/admin/data");
        const data = await res.json();
        document.getElementById("stat-v").innerText = data.watchLogs.length;
        document.getElementById("stat-c").innerText = data.chats.length;
        document.getElementById("stat-r").innerText = data.registrants.length;

        const tIn = document.getElementById("t-input"),
          nIn = document.getElementById("n-input"),
          hIn = document.getElementById("hls-url"),
          yIn = document.getElementById("yt-url");
        if (isFirst || document.activeElement !== tIn)
          tIn.value = data.eventTitle;
        if (isFirst || document.activeElement !== nIn) nIn.value = data.notice;
        if (isFirst || document.activeElement !== hIn)
          hIn.value = data.streamConfig.hlsUrl;
        if (isFirst || document.activeElement !== yIn)
          yIn.value = data.streamConfig.youtubeUrl;
        if (isFirst)
          document.querySelector(
            `input[name="mode"][value="${data.streamMode}"]`
          ).checked = true;

        document.getElementById("log-list").innerHTML = data.watchLogs
          .slice()
          .reverse()
          .map(
            (l) => `
                <tr><td class="font-bold">${l.name}</td><td>${
              l.email
            }</td><td>${l.time}</td>
                <td><span class="px-2 py-1 rounded-full text-[9px] font-black ${
                  l.status === "입장"
                    ? "bg-blue-50 text-blue-600"
                    : l.status === "화면 가림"
                    ? "bg-yellow-50 text-yellow-600"
                    : "bg-red-50 text-red-600"
                }">${l.status}</span></td>
                <td class="text-slate-300 font-mono text-[10px]">${
                  l.ip
                }</td></tr>
            `
          )
          .join("");

        document.getElementById("chat-admin-feed").innerHTML = data.chats
          .slice()
          .reverse()
          .map(
            (c) => `
                <div class="p-8 bg-slate-50 rounded-[32px] flex justify-between items-center mb-4 border border-slate-100">
                    <div><b class="text-blue-600 text-[10px] uppercase font-black">${c.user}</b><p class="mt-1 font-medium">${c.message}</p></div>
                    <button onclick="deleteChat(${c.id})" class="text-red-400 font-black text-[9px] uppercase">Remove</button>
                </div>
            `
          )
          .join("");
      }

      async function updateAll() {
        const mode = document.querySelector('input[name="mode"]:checked').value;
        await fetch("/api/admin/update", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            eventTitle: document.getElementById("t-input").value,
            notice: document.getElementById("n-input").value,
            streamMode: mode,
            streamConfig: {
              hlsUrl: document.getElementById("hls-url").value,
              youtubeUrl: document.getElementById("yt-url").value,
            },
          }),
        });
        alert("저장 완료!");
      }
      async function deleteChat(id) {
        await fetch(`/api/chats/${id}`, { method: "DELETE" });
        load();
      }
      function openTab(name) {
        document
          .querySelectorAll(".tab-content")
          .forEach((c) => c.classList.remove("active"));
        document
          .querySelectorAll(".tab-btn")
          .forEach((b) => b.classList.remove("active"));
        document.getElementById(name).classList.add("active");
        event.currentTarget.classList.add("active");
      }
    </script>
  </body>
</html>
