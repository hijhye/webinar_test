<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RISS LIVE : SMART WEBINAR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
    />
    <style>
      body {
        font-family: "Pretendard", sans-serif;
        background-color: #ffffff;
        color: #0f172a;
        letter-spacing: -0.03em;
      }
      #top-notice-bar {
        background: #1e293b;
        transition: all 0.5s;
      }
      .video-stage {
        border-radius: 32px;
        background: #000;
        overflow: hidden;
        box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.15);
        border: 1px solid #f1f5f9;
      }
      .chat-row {
        border-bottom: 1px solid #f8fafc;
        padding: 18px 8px;
      }
      .no-scrollbar::-webkit-scrollbar {
        width: 0px;
      }
      .btn-black {
        background: #0f172a;
        color: #fff;
        transition: all 0.2s;
        cursor: pointer;
      }
      .btn-black:hover {
        background: #334155;
        transform: translateY(-1px);
      }
      textarea {
        border: 1px solid #e2e8f0 !important;
        background: #fdfdfe !important;
        outline: none;
      }
    </style>
  </head>
  <body class="antialiased">
    <div
      id="login-modal"
      class="fixed inset-0 z-[100] bg-white flex items-center justify-center p-6 text-center"
    >
      <div class="w-full max-w-[340px]">
        <h1
          id="login-title"
          class="text-4xl font-black tracking-tighter italic mb-12"
        >
          RISS LIVE
        </h1>
        <div class="space-y-3">
          <input
            id="l-name"
            type="text"
            placeholder="성함"
            class="w-full border border-slate-100 bg-slate-50 p-4 rounded-2xl outline-none"
          />
          <input
            id="l-email"
            type="email"
            placeholder="이메일 주소"
            class="w-full border border-slate-100 bg-slate-50 p-4 rounded-2xl outline-none"
          />
          <button
            onclick="doLogin()"
            class="w-full btn-black py-5 rounded-3xl font-bold text-lg mt-6 shadow-2xl"
          >
            시청 시작하기
          </button>
          <div class="flex flex-col gap-4 mt-8">
            <button
              onclick="startPreview()"
              class="text-[10px] font-black border border-slate-100 py-3 rounded-2xl text-slate-400 uppercase tracking-widest"
            >
              Preview (15s)
            </button>
            <button
              onclick="showRegModal()"
              class="text-[10px] font-black text-blue-500 uppercase tracking-widest"
            >
              당일 신청하고 입장하기
            </button>
          </div>
        </div>
      </div>
    </div>

    <div
      id="reg-modal"
      class="hidden fixed inset-0 z-[110] bg-white flex items-center justify-center p-6 text-center"
    >
      <div class="w-full max-w-[340px]">
        <h2 class="text-3xl font-black italic mb-3 uppercase tracking-tighter">
          Registration
        </h2>
        <p class="text-slate-400 font-medium text-sm mb-10">
          당일 신청 정보를 입력해주세요.
        </p>
        <div class="space-y-3">
          <input
            id="r-name"
            type="text"
            placeholder="성함"
            class="w-full border border-slate-100 bg-slate-50 p-4 rounded-2xl outline-none"
          />
          <input
            id="r-email"
            type="email"
            placeholder="이메일 주소"
            class="w-full border border-slate-100 bg-slate-50 p-4 rounded-2xl outline-none"
          />
          <button
            onclick="registerToday()"
            class="w-full btn-black py-5 rounded-3xl font-bold text-lg mt-6 shadow-2xl"
          >
            신청 완료 및 입장
          </button>
          <button
            onclick="hideRegModal()"
            class="w-full text-[10px] font-black text-slate-300 uppercase tracking-widest pt-4"
          >
            돌아가기
          </button>
        </div>
      </div>
    </div>

    <div id="main-ui" class="hidden opacity-0 transition-opacity duration-1000">
      <div
        id="top-notice-bar"
        class="h-10 flex items-center justify-center text-white text-[12px] font-bold"
      >
        <p id="notice-content"></p>
      </div>
      <header
        class="h-16 flex justify-between items-center px-10 bg-white border-b border-slate-50 sticky top-0 z-40"
      >
        <span class="text-lg font-black tracking-tighter italic"
          >RISS LIVE</span
        >
        <div class="flex items-center gap-6">
          <span
            id="user-info"
            class="text-[11px] font-black text-slate-300 uppercase tracking-widest"
          ></span>
          <button
            onclick="doLogout()"
            class="text-[10px] font-black bg-red-50 px-3 py-1 rounded-full text-red-400 hover:bg-red-500 hover:text-white transition-all"
          >
            종료
          </button>
          <button
            onclick="window.open('/admin')"
            class="text-[10px] font-black bg-slate-50 px-3 py-1 rounded-full text-slate-400"
          >
            ADMIN
          </button>
        </div>
      </header>
      <main class="max-w-[1550px] mx-auto p-6 md:p-14 grid grid-cols-12 gap-14">
        <div class="col-span-12 lg:col-span-9">
          <div class="video-stage mb-10">
            <div id="p1-box" class="w-full h-full">
              <video id="vid" class="video-js vjs-fluid"></video>
            </div>
            <iframe
              id="p2-box"
              class="hidden w-full h-full aspect-video"
              src=""
              frameborder="0"
            ></iframe>
          </div>
          <div>
            <h2
              id="event-title"
              class="text-3xl font-black text-slate-900 mb-2 tracking-tighter italic"
            >
              로딩 중...
            </h2>
            <div
              id="server-nav"
              class="flex gap-4 text-xs font-bold text-slate-400"
            >
              <button onclick="switchP(1)" id="btn-p1">서버 1 (HLS)</button>
              <button onclick="switchP(2)" id="btn-p2">서버 2 (유튜브)</button>
            </div>
          </div>
        </div>
        <aside class="col-span-12 lg:col-span-3 flex flex-col h-[750px]">
          <h3
            class="font-black text-xl mb-8 tracking-tighter italic text-slate-900"
          >
            Q&A FEED
          </h3>
          <div
            id="chat-list"
            class="flex-1 overflow-y-auto no-scrollbar pb-6 border-t border-slate-50"
          ></div>
          <div class="pt-8 relative">
            <textarea
              id="chat-msg"
              class="w-full p-6 rounded-[2.5rem] text-sm h-36 resize-none"
              placeholder="로그인 후 이용 가능"
              disabled
            ></textarea>
          </div>
        </aside>
      </main>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
      let player = videojs("vid");
      let currentUser = "",
        currentUserEmail = "";
      let previewTimer;

      // ★ [핵심] 퇴장 감지 고도화 (Keepalive)
      function sendFinalLog(status) {
        if (!currentUser) return;
        fetch("/api/log", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: currentUser,
            email: currentUserEmail,
            status: status,
          }),
          keepalive: true, // ★ 브라우저가 꺼져도 전송을 보장함
        });
      }

      window.addEventListener("visibilitychange", () => {
        if (currentUser) {
          const status = document.hidden ? "화면 가림" : "복귀";
          navigator.sendBeacon(
            "/api/log",
            JSON.stringify({
              name: currentUser,
              email: currentUserEmail,
              status,
            })
          );
        }
      });

      // 창 닫을 때 무조건 발동
      window.addEventListener("pagehide", () => sendFinalLog("퇴장"));

      document.addEventListener("DOMContentLoaded", () => {
        const handleEnter = (e, cb) => {
          if (e.key === "Enter" && !e.isComposing) {
            e.preventDefault();
            cb();
          }
        };
        document
          .getElementById("l-name")
          .addEventListener("keydown", (e) => handleEnter(e, doLogin));
        document
          .getElementById("l-email")
          .addEventListener("keydown", (e) => handleEnter(e, doLogin));
        document
          .getElementById("r-name")
          .addEventListener("keydown", (e) => handleEnter(e, registerToday));
        document
          .getElementById("r-email")
          .addEventListener("keydown", (e) => handleEnter(e, registerToday));
        syncData();
        setInterval(syncData, 3000);
      });

      function showRegModal() {
        document.getElementById("reg-modal").classList.remove("hidden");
      }
      function hideRegModal() {
        document.getElementById("reg-modal").classList.add("hidden");
      }

      function startPreview() {
        document.getElementById("login-modal").classList.add("opacity-0");
        document.getElementById("login-modal").style.pointerEvents = "none";
        document.getElementById("main-ui").classList.remove("hidden");
        setTimeout(
          () => document.getElementById("main-ui").classList.add("opacity-100"),
          50
        );
        loadStream();
        previewTimer = setTimeout(() => {
          if (!currentUser) {
            alert("미리보기가 종료되었습니다.");
            document
              .getElementById("login-modal")
              .classList.remove("opacity-0");
            document.getElementById("login-modal").style.pointerEvents = "auto";
            player.pause();
          }
        }, 15000);
      }

      async function doLogin() {
        const name = document.getElementById("l-name").value.trim();
        const email = document.getElementById("l-email").value.trim();
        if (!name || !email) return alert("입력 오류");
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email }),
        });
        if (res.ok) {
          currentUser = name;
          currentUserEmail = email;
          document.getElementById("login-modal").classList.add("hidden");
          document.getElementById("main-ui").classList.remove("hidden");
          document.getElementById("main-ui").classList.add("opacity-100");
          document.getElementById("user-info").innerText = name.toUpperCase();
          document.getElementById("chat-msg").disabled = false;
          document
            .getElementById("chat-msg")
            .addEventListener("keydown", (e) => {
              if (e.key === "Enter" && !e.isComposing) {
                e.preventDefault();
                sendChat();
              }
            });
          clearTimeout(previewTimer);
          loadStream();
        } else alert("신청 내역 없음");
      }

      async function doLogout() {
        if (!confirm("종료하시겠습니까?")) return;
        sendFinalLog("퇴장");
        location.reload();
      }

      async function registerToday() {
        const name = document.getElementById("r-name").value.trim();
        const email = document.getElementById("r-email").value.trim();
        if (!name || !email) return alert("입력 오류");
        await fetch("/api/admin/reg", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email }),
        });
        alert("신청 완료!");
        hideRegModal();
        document.getElementById("l-name").value = name;
        document.getElementById("l-email").value = email;
        doLogin();
      }

      async function syncData() {
        try {
          const res = await fetch("/api/admin/data");
          const data = await res.json();
          document.getElementById("login-title").innerText = data.eventTitle;
          document.getElementById("event-title").innerText = data.eventTitle;
          document.getElementById("notice-content").innerText = data.notice;

          const b1 = document.getElementById("btn-p1"),
            b2 = document.getElementById("btn-p2");
          if (data.streamMode === "hls") {
            b1.classList.remove("hidden");
            b2.classList.add("hidden");
            switchP(1);
          } else if (data.streamMode === "youtube") {
            b1.classList.add("hidden");
            b2.classList.remove("hidden");
            switchP(2);
          } else {
            b1.classList.remove("hidden");
            b2.classList.remove("hidden");
          }

          const list = document.getElementById("chat-list");
          list.innerHTML = data.chats
            .map(
              (c) => `
                    <div class="chat-row">
                        <div class="flex items-center gap-2 mb-1.5"><b class="text-[10px] text-slate-800 uppercase italic">${c.user}</b> <span class="text-[9px] text-slate-300">${c.time}</span></div>
                        <p class="text-[13px] text-slate-500 font-medium">${c.message}</p>
                    </div>
                `
            )
            .join("");
          list.scrollTop = list.scrollHeight;
        } catch (e) {
          console.error(e);
        }
      }

      async function loadStream() {
        const res = await fetch("/api/admin/data");
        const data = await res.json();
        player.src({
          type: "application/x-mpegURL",
          src: data.streamConfig.hlsUrl,
        });
        document.getElementById("p2-box").src = data.streamConfig.youtubeUrl;
      }

      async function sendChat() {
        const msgEl = document.getElementById("chat-msg");
        if (!msgEl.value.trim()) return;
        await fetch("/api/chats", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ user: currentUser, message: msgEl.value }),
        });
        msgEl.value = "";
        syncData();
      }

      function switchP(n) {
        const b1 = document.getElementById("btn-p1"),
          b2 = document.getElementById("btn-p2");
        if (n === 1) {
          document.getElementById("p1-box").classList.remove("hidden");
          document.getElementById("p2-box").classList.add("hidden");
          b1.classList.add("text-slate-900");
          b2.classList.remove("text-slate-900");
          player.play();
        } else {
          document.getElementById("p1-box").classList.add("hidden");
          document.getElementById("p2-box").classList.remove("hidden");
          b2.classList.add("text-slate-900");
          b1.classList.remove("text-slate-900");
          player.pause();
        }
      }
    </script>
  </body>
</html>
